<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trackin - Camera</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0c4a6e;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#video-container {
  width: 100%;
  max-width: 480px;
  max-height: 40vh;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  margin: 12px 16px 0;
  position: relative;
}
video { width: 100%; height: 100%; object-fit: cover; display: block; }
canvas { display: none; }

#alert-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#alert-overlay.active { display: flex; }
#alert-number {
  font-size: 96px;
  font-weight: 900;
  color: #f87171;
  text-shadow: 0 0 30px rgba(248,113,113,0.6);
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: 0.8; }
}
#alert-label {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
}

.bar {
  width: 100%;
  max-width: 480px;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}
#status { color: #94a3b8; font-size: 13px; }
.ok { color: #4ade80 !important; }
.err { color: #f87171 !important; }
#next-timer {
  color: #38bdf8;
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.controls {
  padding: 12px 16px;
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
}
button {
  background: rgba(255,255,255,0.15);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
}
button:active { background: rgba(255,255,255,0.3); }
.active { background: #0ea5e9; }
#cancel-btn {
  display: none;
  background: #dc2626;
  font-weight: 600;
}
#cancel-btn.visible { display: inline-block; }
#log {
  width: 100%;
  max-width: 480px;
  padding: 8px 16px;
  font-size: 12px;
  color: #94a3b8;
  flex: 1;
  overflow-y: auto;
}
#log div {
  padding: 4px 8px;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
}
</style>
</head>
<body>

<h2 style="padding:12px 0 0;font-size:18px;font-weight:600;">Trackin Camera</h2>

<div id="video-container">
  <video id="video" autoplay playsinline muted></video>
  <div id="alert-overlay">
    <div id="alert-number"></div>
    <div id="alert-label">Tap Cancel to skip</div>
  </div>
</div>
<canvas id="canvas"></canvas>

<div class="bar">
  <span id="status">Starting camera...</span>
  <span id="next-timer"></span>
</div>

<div class="controls">
  <button id="snap-btn">Snap Now</button>
  <button id="cancel-btn">Cancel</button>
  <button id="auto-btn" class="active">Auto: ON</button>
</div>

<div id="log"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusEl = document.getElementById('status');
const nextTimerEl = document.getElementById('next-timer');
const alertOverlay = document.getElementById('alert-overlay');
const alertNumber = document.getElementById('alert-number');
const cancelBtn = document.getElementById('cancel-btn');
const logEl = document.getElementById('log');

const INTERVAL = {{ CAPTURE_INTERVAL }};
const ALERT_SECONDS = {{ ALERT_SECONDS }};
let autoMode = true;
let secondsLeft = INTERVAL;
let timerInterval = null;

async function startCamera() {
  try {
    video.srcObject = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    statusEl.textContent = 'Camera ready';
    statusEl.className = 'ok';
    startTimer();
  } catch (err) {
    statusEl.textContent = 'Camera error: ' + err.message;
    statusEl.className = 'err';
  }
}

function startTimer() {
  secondsLeft = INTERVAL;
  clearInterval(timerInterval);
  updateDisplay();
  timerInterval = setInterval(() => {
    if (!autoMode) return;
    secondsLeft--;
    updateDisplay();
    if (secondsLeft <= 0) {
      capture();
      resetCycle();
    }
  }, 1000);
}

function resetCycle() {
  secondsLeft = INTERVAL;
  alertOverlay.classList.remove('active');
  cancelBtn.classList.remove('visible');
  updateDisplay();
}

function updateDisplay() {
  if (!autoMode) {
    nextTimerEl.textContent = '';
    alertOverlay.classList.remove('active');
    cancelBtn.classList.remove('visible');
    return;
  }

  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  nextTimerEl.textContent = m + ':' + String(s).padStart(2, '0');

  if (secondsLeft <= ALERT_SECONDS && secondsLeft > 0) {
    alertOverlay.classList.add('active');
    alertNumber.textContent = secondsLeft;
    cancelBtn.classList.add('visible');
  } else {
    alertOverlay.classList.remove('active');
    cancelBtn.classList.remove('visible');
  }
}

function capture() {
  if (!video.srcObject) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => upload(blob), 'image/jpeg', 0.9);
}

async function upload(blob) {
  statusEl.textContent = 'Uploading...';
  statusEl.className = '';
  const formData = new FormData();
  formData.append('image', blob, 'photo.jpg');

  try {
    const resp = await fetch('/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.ok) {
      statusEl.textContent = 'Uploaded';
      statusEl.className = 'ok';
      addLog(data.timestamp);
    } else {
      statusEl.textContent = 'Error';
      statusEl.className = 'err';
    }
  } catch (err) {
    statusEl.textContent = 'Failed';
    statusEl.className = 'err';
  }
}

function addLog(ts) {
  const div = document.createElement('div');
  div.textContent = ts;
  logEl.prepend(div);
}

document.getElementById('snap-btn').addEventListener('click', () => {
  capture();
  resetCycle();
});

cancelBtn.addEventListener('click', () => {
  statusEl.textContent = 'Skipped';
  statusEl.className = '';
  resetCycle();
});

document.getElementById('auto-btn').addEventListener('click', function() {
  autoMode = !autoMode;
  this.textContent = 'Auto: ' + (autoMode ? 'ON' : 'OFF');
  this.classList.toggle('active', autoMode);
  if (autoMode) resetCycle();
  updateDisplay();
});

startCamera();
</script>

</body>
</html>
