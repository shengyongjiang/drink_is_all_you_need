<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Trackin - Camera</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0c4a6e;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#video-container {
  width: 100%;
  max-width: 480px;
  background: black;
}
video { width: 100%; display: block; }
canvas { display: none; }
.bar {
  width: 100%;
  max-width: 480px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}
#status { color: #94a3b8; }
.ok { color: #4ade80 !important; }
.err { color: #f87171 !important; }
#countdown { color: #38bdf8; font-size: 16px; font-weight: bold; }
.controls {
  padding: 16px;
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
}
button {
  background: rgba(255,255,255,0.15);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
}
button:active { background: rgba(255,255,255,0.3); }
.active { background: #0ea5e9; }
#log {
  width: 100%;
  max-width: 480px;
  padding: 8px 16px;
  font-size: 12px;
  color: #64748b;
  max-height: 120px;
  overflow-y: auto;
}
#log div { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
</style>
</head>
<body>

<div id="video-container">
  <video id="video" autoplay playsinline muted></video>
</div>
<canvas id="canvas"></canvas>

<div class="bar">
  <span id="status">Starting camera...</span>
  <span id="countdown"></span>
</div>

<div class="controls">
  <button id="snap-btn">Snap Now</button>
  <button id="auto-btn" class="active">Auto: ON</button>
</div>

<div id="log"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusEl = document.getElementById('status');
const countdownEl = document.getElementById('countdown');
const logEl = document.getElementById('log');

const INTERVAL = 10 * 60;
let autoMode = true;
let secondsLeft = INTERVAL;
let timerInterval = null;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    statusEl.textContent = 'Camera ready';
    statusEl.className = 'ok';
    startTimer();
  } catch (err) {
    statusEl.textContent = 'Camera error: ' + err.message;
    statusEl.className = 'err';
  }
}

function startTimer() {
  secondsLeft = INTERVAL;
  clearInterval(timerInterval);
  updateCountdown();
  timerInterval = setInterval(() => {
    if (!autoMode) return;
    secondsLeft--;
    updateCountdown();
    if (secondsLeft <= 0) {
      capture();
      secondsLeft = INTERVAL;
    }
  }, 1000);
}

function updateCountdown() {
  if (!autoMode) { countdownEl.textContent = ''; return; }
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  countdownEl.textContent = m + ':' + String(s).padStart(2, '0');
}

function capture() {
  if (!video.srcObject) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => upload(blob), 'image/jpeg', 0.9);
}

async function upload(blob) {
  statusEl.textContent = 'Uploading...';
  statusEl.className = '';
  const formData = new FormData();
  formData.append('image', blob, 'photo.jpg');

  try {
    const resp = await fetch('/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.ok) {
      statusEl.textContent = 'Uploaded';
      statusEl.className = 'ok';
      addLog(data.timestamp);
    } else {
      statusEl.textContent = 'Error';
      statusEl.className = 'err';
    }
  } catch (err) {
    statusEl.textContent = 'Failed';
    statusEl.className = 'err';
  }
}

function addLog(ts) {
  const div = document.createElement('div');
  div.textContent = ts;
  logEl.prepend(div);
}

document.getElementById('snap-btn').addEventListener('click', () => {
  capture();
  secondsLeft = INTERVAL;
});

document.getElementById('auto-btn').addEventListener('click', function() {
  autoMode = !autoMode;
  this.textContent = 'Auto: ' + (autoMode ? 'ON' : 'OFF');
  this.classList.toggle('active', autoMode);
  updateCountdown();
});

startCamera();
</script>

</body>
</html>
