<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f9ff;
  color: #0c4a6e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px;
}
h1 { font-size: 28px; margin-bottom: 8px; }
p { color: #64748b; margin-bottom: 32px; }
.links { width: 100%; max-width: 360px; }
.links a {
  display: block;
  background: white;
  color: #0c4a6e;
  text-decoration: none;
  padding: 16px 20px;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(14,165,233,0.1);
  font-size: 16px;
}
.links a:active { background: #e0f2fe; }
.links a span { color: #64748b; font-size: 13px; display: block; margin-top: 4px; }
</style>
</head>
<body>

<h1>Trackin</h1>
<p>Water intake tracker</p>

<div class="links">
  <a href="/camera">
    Camera
    <span>Take a photo of your cup</span>
  </a>
</div>

</body>
</html>
