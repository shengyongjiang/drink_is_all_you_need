<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackin - Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      keyframes: {
        wave: {
          '0%': { transform: 'rotate(0deg)' },
          '100%': { transform: 'rotate(360deg)' },
        },
        bubble: {
          '0%': { transform: 'translateY(0) scale(1)', opacity: '0.6' },
          '50%': { opacity: '0.3' },
          '100%': { transform: 'translateY(-280px) scale(0.3)', opacity: '0' },
        },
        fadeInUp: {
          '0%': { opacity: '0', transform: 'translateY(10px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' },
        },
      },
      animation: {
        wave: 'wave 4s linear infinite',
        bubble1: 'bubble 3s ease-in infinite',
        bubble2: 'bubble 4s ease-in infinite 0.5s',
        bubble3: 'bubble 3.5s ease-in infinite 1s',
        bubble4: 'bubble 4.5s ease-in infinite 1.5s',
        bubble5: 'bubble 3.2s ease-in infinite 2s',
        fadeInUp: 'fadeInUp 0.4s ease-out',
      },
    },
  },
}
</script>
<style>
  .bottle-water {
    transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .wave-container {
    position: absolute;
    top: -12px;
    left: 0;
    right: 0;
    height: 24px;
    overflow: hidden;
  }
  .wave-svg {
    position: absolute;
    bottom: 0;
    left: -100%;
    width: 300%;
    height: 24px;
    animation: waveSlide 3s linear infinite;
  }
  .wave-svg-2 {
    animation: waveSlide 4s linear infinite reverse;
    opacity: 0.5;
  }
  @keyframes waveSlide {
    0% { transform: translateX(0); }
    100% { transform: translateX(33.33%); }
  }
</style>
</head>
<body class="bg-sky-50 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

let CONFIG = {
  cupCapacityMl: 300,
  dailyGoalMl: 3000,
  notificationInterval: 15,
};

function getMoodEmoji(progress) {
  if (progress >= 1) return { emoji: '🎉', text: 'Goal reached!' };
  if (progress >= 0.75) return { emoji: '😊', text: 'Almost there!' };
  if (progress >= 0.5) return { emoji: '🙂', text: 'Halfway!' };
  if (progress >= 0.25) return { emoji: '😐', text: 'Keep going' };
  return { emoji: '🏜️', text: 'Start drinking!' };
}

function Bubble({ className }) {
  return (
    <div className={`absolute rounded-full bg-white/30 ${className}`} />
  );
}

function Bottle({ progress, totalMl, goalMl, expectedMl }) {
  const remainPct = Math.max((1 - progress) * 100, 0);
  const remainMl = Math.max(goalMl - totalMl, 0);
  const waterColor = 'from-blue-400 to-blue-500';

  const marks = [0.5, 1.0, 1.5, 2.0, 2.5, 3.0];

  return (
    <div className="flex items-end justify-center gap-3">
      {/* Graduation marks */}
      <div className="relative h-[320px] flex flex-col justify-between py-1">
        {marks.slice().reverse().map((val) => {
          const markPct = val / (goalMl / 1000);
          return (
            <div key={val} className="flex items-center gap-1" style={{ position: 'absolute', bottom: `${markPct * 100}%`, right: 0, transform: 'translateY(50%)' }}>
              <span className="text-xs text-sky-800/50 font-medium whitespace-nowrap">{val}L</span>
              <div className="w-2 h-px bg-sky-800/30" />
            </div>
          );
        })}
      </div>

      {/* Bottle */}
      <div className="relative flex flex-col items-center">
        {/* Bottle cap */}
        <div className="w-16 h-4 bg-sky-200 rounded-t-lg border-2 border-b-0 border-sky-300 relative z-10" />
        {/* Bottle neck */}
        <div className="w-20 h-6 bg-white/80 border-x-2 border-sky-200 relative z-10" />
        {/* Bottle body */}
        <div className="relative w-40 h-[320px] bg-white/60 border-2 border-sky-200 rounded-b-3xl overflow-hidden backdrop-blur-sm">
          {/* Water fill */}
          <div
            className={`bottle-water absolute bottom-0 left-0 right-0 bg-gradient-to-t ${waterColor} rounded-b-3xl`}
            style={{ height: `${remainPct}%` }}
          >
            {/* Wave animation */}
            {remainPct > 0 && remainPct < 98 && (
              <div className="wave-container">
                <svg className="wave-svg" viewBox="0 0 600 24" preserveAspectRatio="none">
                  <path d={`M0,12 C50,0 100,24 150,12 C200,0 250,24 300,12 C350,0 400,24 450,12 C500,0 550,24 600,12 L600,24 L0,24 Z`}
                    fill="rgba(96,165,250,0.5)" />
                </svg>
                <svg className="wave-svg wave-svg-2" viewBox="0 0 600 24" preserveAspectRatio="none">
                  <path d={`M0,12 C50,24 100,0 150,12 C200,24 250,0 300,12 C350,24 400,0 450,12 C500,24 550,0 600,12 L600,24 L0,24 Z`}
                    fill="rgba(59,130,246,0.4)" />
                </svg>
              </div>
            )}

            {/* Bubbles */}
            {remainPct > 5 && (
              <>
                <Bubble className="w-2 h-2 bottom-4 left-6 animate-bubble1" />
                <Bubble className="w-3 h-3 bottom-8 left-16 animate-bubble2" />
                <Bubble className="w-1.5 h-1.5 bottom-2 left-24 animate-bubble3" />
                <Bubble className="w-2 h-2 bottom-6 left-10 animate-bubble4" />
                <Bubble className="w-1 h-1 bottom-3 left-28 animate-bubble5" />
              </>
            )}
          </div>

          {/* Green pace line */}
          {expectedMl > 0 && (
            <div
              className="absolute left-0 right-0 z-20 flex items-center"
              style={{ bottom: `${Math.max((1 - expectedMl / goalMl) * 100, 0)}%` }}
            >
              <div className="w-full h-0.5 bg-green-400" />
              <div className="absolute -right-1 bg-green-400 text-white text-[9px] px-1 py-px rounded-sm whitespace-nowrap font-medium">
                goal
              </div>
            </div>
          )}

          {/* Center label */}
          <div className="absolute inset-0 flex items-center justify-center z-10">
            <div className="text-center">
              <div className="text-2xl font-bold text-sky-900 drop-shadow-sm">
                {(remainMl / 1000).toFixed(1)}L
              </div>
              <div className="text-xs text-sky-700/70 font-medium">
                remaining
              </div>
              <div className="text-[10px] text-sky-600/60 mt-0.5">
                {(totalMl / 1000).toFixed(1)}L / {(goalMl / 1000).toFixed(1)}L drunk
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Spacer to balance layout */}
      <div className="w-10" />
    </div>
  );
}

function MoodIndicator({ progress }) {
  const mood = getMoodEmoji(progress);
  return (
    <div className="text-center mt-4 animate-fadeInUp">
      <div className="text-4xl mb-1">{mood.emoji}</div>
      <div className="text-sm text-sky-700 font-medium">{mood.text}</div>
    </div>
  );
}

function StatsRow({ events, totalMl }) {
  const drinkEvents = events.filter(e => e.type === 'drink');
  const count = drinkEvents.length;
  const avg = count > 0 ? Math.round(totalMl / count) : 0;

  let lastDrinkText = '--';
  if (count > 0) {
    const lastTime = drinkEvents[drinkEvents.length - 1].time;
    const [h, m] = lastTime.split(':').map(Number);
    const now = new Date();
    const diffMin = (now.getHours() * 60 + now.getMinutes()) - (h * 60 + m);
    if (diffMin < 1) lastDrinkText = 'Just now';
    else if (diffMin < 60) lastDrinkText = `${diffMin}m ago`;
    else lastDrinkText = `${Math.floor(diffMin / 60)}h ${diffMin % 60}m ago`;
  }

  const stats = [
    { label: 'Drinks', value: count },
    { label: 'Avg', value: avg > 0 ? `${avg}ml` : '--' },
    { label: 'Last drink', value: lastDrinkText },
  ];

  return (
    <div className="grid grid-cols-3 gap-3 w-full max-w-sm mx-auto mt-6">
      {stats.map((s) => (
        <div key={s.label} className="bg-white rounded-xl p-3 text-center shadow-sm border border-sky-100">
          <div className="text-lg font-bold text-sky-900">{s.value}</div>
          <div className="text-xs text-sky-600">{s.label}</div>
        </div>
      ))}
    </div>
  );
}

function PaceBar({ pace, progress }) {
  const paceProgress = pace.expected_ml > 0
    ? Math.min(progress / (pace.expected_ml / CONFIG.dailyGoalMl), 2)
    : 1;
  const barColor = pace.status === 'behind' ? 'bg-orange-400' : pace.status === 'completed' ? 'bg-green-400' : 'bg-blue-400';
  const label = pace.status === 'behind'
    ? `${Math.round(pace.expected_ml - CONFIG.dailyGoalMl * progress)}ml behind pace`
    : pace.status === 'completed' ? 'Goal complete!' : 'On track';

  return (
    <div className="w-full max-w-sm mx-auto mt-5">
      <div className="flex justify-between text-xs text-sky-700 mb-1">
        <span>{label}</span>
        <span>{Math.round(progress * 100)}%</span>
      </div>
      <div className="h-2 bg-sky-100 rounded-full overflow-hidden">
        <div
          className={`h-full ${barColor} rounded-full transition-all duration-1000`}
          style={{ width: `${Math.min(progress * 100, 100)}%` }}
        />
      </div>
    </div>
  );
}

const IMAGE_ORDER = [
  ['original.jpg', 'Original'],
  ['yolo.jpg', 'YOLO Detection'],
  ['cup.jpg', 'Cup Mask'],
  ['regions.jpg', 'Regions'],
  ['split.jpg', 'Split Profile'],
  ['level.jpg', 'Water Level'],
  ['sam2fill.jpg', 'SAM2 Fill'],
];

function DetailPanel({ timestamp, event, onClose }) {
  const [detail, setDetail] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    fetch(`/api/capture/${timestamp}`)
      .then(r => r.json())
      .then(d => { setDetail(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [timestamp]);

  const { images, result } = detail || { images: [], result: {} };

  return (
    <div className="bg-white rounded-2xl shadow-lg border border-sky-100 p-4 animate-fadeInUp sticky top-6">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="text-lg">{(EVENT_STYLES[event.type] || EVENT_STYLES.unchanged).icon}</span>
          <span className="font-bold text-sky-900">{(EVENT_STYLES[event.type] || EVENT_STYLES.unchanged).label(event)}</span>
          <span className="text-xs text-sky-400">{event.time}</span>
        </div>
        <button onClick={onClose} className="text-sky-400 hover:text-sky-600 text-lg leading-none">&times;</button>
      </div>

      {loading ? (
        <div className="text-sm text-sky-400 py-8 text-center">Loading...</div>
      ) : (
        <>
          <div className="bg-sky-50 rounded-lg p-3 mb-3 text-xs">
            <div className="font-semibold text-sky-800 mb-1.5">Analysis Result</div>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-sky-700">
              <span>Cup class:</span><span className="font-medium">{result.cup_class}</span>
              <span>Confidence:</span><span className="font-medium">{(result.cup_confidence * 100).toFixed(1)}%</span>
              <span>SAM1 level:</span><span className="font-medium">{(result.sam1_level * 100).toFixed(1)}%</span>
              <span>SAM2 level:</span><span className="font-medium">{(result.sam2_level * 100).toFixed(1)}%</span>
              <span>Final level:</span><span className="font-bold text-blue-600">{(result.level * 100).toFixed(1)}%</span>
              {event.level_before != null && (<>
                <span>Level change:</span>
                <span className="font-medium text-orange-500">
                  {(event.level_before * 100).toFixed(0)}% → {(event.level_after * 100).toFixed(0)}%
                </span>
              </>)}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            {IMAGE_ORDER.filter(([name]) => images.includes(name)).map(([name, label]) => (
              <div key={name} className="relative group">
                <img
                  src={`/data/${timestamp}/${name}`}
                  alt={label}
                  className="w-full rounded-lg border border-sky-100 shadow-sm"
                  loading="lazy"
                />
                <div className="absolute bottom-0 left-0 right-0 bg-black/50 text-white text-[10px] px-1.5 py-0.5 rounded-b-lg">
                  {label}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

const EVENT_STYLES = {
  drink:     { icon: '💧', dot: 'bg-blue-500',   label: (e) => e.ml > 0 ? `${e.ml}ml` : `${(e.level * 100).toFixed(0)}% full` },
  refill:    { icon: '💧', dot: 'bg-green-400',  label: (e) => e.ml > 0 ? `+${e.ml}ml · Refill → ${(e.level * 100).toFixed(0)}%` : `Refill → ${(e.level * 100).toFixed(0)}%` },
  unchanged: { icon: '💧', dot: 'bg-gray-300',   label: (e) => `${(e.level * 100).toFixed(0)}% (no change)` },
};

function Timeline({ events, selected, onSelect }) {
  if (events.length === 0) {
    return (
      <div className="text-center text-sky-400 mt-6 py-8">
        <div className="text-3xl mb-2">💧</div>
        <div className="text-sm">No captures recorded yet today</div>
        <div className="text-xs mt-1">Take a photo of your cup to start tracking</div>
      </div>
    );
  }

  const reversed = [...events].reverse();
  return (
    <div className="w-full mt-6">
      <h3 className="text-sm font-semibold text-sky-800 mb-3">Today's captures</h3>
      <div className="relative pl-6">
        <div className="absolute left-2 top-1 bottom-1 w-px bg-sky-200" />

        {reversed.map((e, i) => {
          const isSelected = selected === e.timestamp;
          const style = EVENT_STYLES[e.type] || EVENT_STYLES.unchanged;
          return (
            <div key={e.timestamp} className="relative mb-3 animate-fadeInUp" style={{ animationDelay: `${i * 0.05}s` }}>
              <div className={`absolute -left-4 top-1.5 w-2.5 h-2.5 rounded-full border-2 border-white shadow-sm ${isSelected ? 'bg-blue-600' : style.dot}`} />
              <div
                className={`bg-white rounded-lg p-3 shadow-sm border cursor-pointer transition-colors ${isSelected ? 'border-blue-400 bg-blue-50/50 ring-1 ring-blue-200' : 'border-sky-100 hover:border-sky-200'}`}
                onClick={() => onSelect(isSelected ? null : e.timestamp)}
              >
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span>{style.icon}</span>
                    <span className="text-sm font-medium text-sky-900">{style.label(e)}</span>
                    {e.level_before != null && (
                      <span className="text-[10px] text-sky-400">
                        {(e.level_before * 100).toFixed(0)}% → {(e.level_after * 100).toFixed(0)}%
                        ({Math.round(e.level_before * CONFIG.cupCapacityMl)}ml → {Math.round(e.level_after * CONFIG.cupCapacityMl)}ml)
                      </span>
                    )}
                  </div>
                  <span className="text-xs text-sky-500">{e.time}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function NotificationButton() {
  const [permission, setPermission] = useState(
    'Notification' in window ? Notification.permission : 'denied'
  );

  if (permission === 'granted' || !('Notification' in window)) return null;

  const handleClick = async () => {
    const result = await Notification.requestPermission();
    setPermission(result);
  };

  return (
    <button
      onClick={handleClick}
      className="mt-4 px-4 py-2 bg-blue-500 text-white text-sm rounded-lg shadow-sm hover:bg-blue-600 active:bg-blue-700 transition-colors"
    >
      🔔 Enable reminders
    </button>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const lastNotify = useRef(0);

  const fetchData = useCallback(async () => {
    try {
      const resp = await fetch('/api/today');
      const json = await resp.json();
      CONFIG.cupCapacityMl = json.cup_capacity_ml;
      CONFIG.dailyGoalMl = json.daily_goal_ml;
      CONFIG.notificationInterval = json.notification_interval;
      setData(json);
      setLoading(false);

      if ('Notification' in window && Notification.permission === 'granted') {
        const now = Date.now();
        if (now - lastNotify.current > CONFIG.notificationInterval * 60 * 1000) {
          const hour = new Date().getHours();
          if (hour >= 8 && hour < 22 && json.pace.status === 'behind') {
            new Notification('Trackin - Drink Water! 💧', {
              body: `You've had ${(json.total_consumed_ml / 1000).toFixed(1)}L but should be at ${(json.pace.expected_ml / 1000).toFixed(1)}L. Time to hydrate!`,
              tag: 'trackin-pace',
            });
            lastNotify.current = now;
          }
        }
      }
    } catch (e) {
      console.error('Fetch error:', e);
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchData();
    const interval = setInterval(fetchData, 30000);
    return () => clearInterval(interval);
  }, [fetchData]);

  if (loading) {
    return (
      <div className="flex items-center justify-center min-h-screen">
        <div className="text-sky-400 text-lg">Loading...</div>
      </div>
    );
  }

  const progress = data ? data.goal_progress : 0;
  const totalMl = data ? data.total_consumed_ml : 0;
  const events = data ? data.events : [];
  const pace = data ? data.pace : { expected_ml: 0, status: 'on_track' };

  const selectedEvent = selected ? events.find(e => e.timestamp === selected) : null;

  return (
    <div className="max-w-5xl mx-auto px-6 py-6 pb-16">
      {/* Header */}
      <div className="flex items-center justify-between mb-6 max-w-md mx-auto">
        <a href="/" className="text-sky-400 text-sm hover:text-sky-600">← Back</a>
        <div className="text-center">
          <h1 className="text-xl font-bold text-sky-900">Trackin</h1>
          <div className="text-xs text-sky-500">{data ? data.date : ''}</div>
        </div>
        <div className="w-12" />
      </div>

      {/* Top section: bottle + stats centered */}
      <div className="max-w-md mx-auto">
        <Bottle
          progress={progress}
          totalMl={totalMl}
          goalMl={data ? data.daily_goal_ml : CONFIG.dailyGoalMl}
          expectedMl={pace.expected_ml}
        />
        <MoodIndicator progress={progress} />
        <div className="text-center">
          <NotificationButton />
        </div>
        <PaceBar pace={pace} progress={progress} />
        <StatsRow events={events} totalMl={totalMl} />
      </div>

      {/* Bottom section: timeline center, detail right */}
      <div className="flex justify-center gap-6 mt-2">
        <div className="w-80 flex-shrink-0">
          <Timeline events={events} selected={selected} onSelect={setSelected} />
        </div>

        {selectedEvent && (
          <div className="w-[480px] flex-shrink-0 mt-6">
            <DetailPanel
              timestamp={selected}
              event={selectedEvent}
              onClose={() => setSelected(null)}
            />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
